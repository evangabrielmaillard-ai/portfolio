<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evan Maillard — Head of Digital & AI Innovation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'ClashDisplay';
    src: url('https://fonts.cdnfonts.com/s/67534/ClashDisplay-Variable.woff2') format('woff2');
    font-weight: 100 900;
    font-display: swap;
  }
</style>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F8F7F4;
  --surface: #FFFFFF;
  --border: #E8E6E0;
  --text: #18171A;
  --muted: #888680;
  --subtle: #F2F0EB;
  --radius: 14px;
  --font-serif: 'ClashDisplay', 'DM Sans', sans-serif;
  --font-sans: 'DM Sans', sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  background: transparent;
  transition: background 0.3s, border-color 0.3s;
  border-bottom: 1px solid transparent;
}

header.scrolled {
  background: rgba(248,247,244,0.92);
  backdrop-filter: blur(10px);
  border-bottom-color: var(--border);
}

.header-name {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.03em;
  opacity: 0;
  transition: opacity 0.3s;
}

header.scrolled .header-name { opacity: 1; }

.back-btn {
  display: none;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 11px;
  font-size: 12px;
  font-family: var(--font-sans);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
}
.back-btn:hover { color: var(--text); border-color: var(--text); }
header.scrolled .back-btn { display: flex; }

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.lang-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.lang-btn {
  background: none;
  border: none;
  padding: 3px 9px;
  font-size: 10px;
  font-family: var(--font-sans);
  font-weight: 500;
  letter-spacing: 0.06em;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.12s;
}
.lang-btn.active { background: var(--text); color: #fff; }

.li-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  transition: color 0.12s;
}
.li-btn:hover { color: var(--text); }
.li-btn svg { width: 13px; height: 13px; fill: currentColor; }

/* ── APP ── */
.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 720px;
  margin: 0 auto;
  position: relative;
}

/* ── LANDING STATE ── */
.landing {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 1.5rem 120px;
  text-align: center;
  transition: opacity 0.35s, transform 0.35s;
}

.landing.hidden {
  opacity: 0;
  pointer-events: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  transform: translateY(-16px);
}

.landing-eyebrow {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
  font-weight: 400;
}

.landing-name {
  font-family: var(--font-serif);
  font-size: clamp(3.8rem, 11vw, 6.5rem);
  line-height: 0.95;
  letter-spacing: -0.04em;
  font-weight: 600;
  margin-bottom: 0.75rem;
}

.landing-name em {
  font-style: normal;
  color: var(--muted);
  font-weight: 300;
}

.landing-title {
  font-size: clamp(0.85rem, 2vw, 1rem);
  color: var(--muted);
  font-weight: 300;
  letter-spacing: 0.04em;
  margin-bottom: 1.25rem;
}

.landing-tagline {
  font-size: clamp(0.9rem, 2vw, 1.05rem);
  color: var(--text);
  font-weight: 300;
  line-height: 1.6;
  min-height: 1.7em;
  margin-bottom: 3rem;
  max-width: 480px;
}

.tagline-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--muted);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.9s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── CHAT STATE ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 70px 1.5rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s;
}

.messages.visible {
  opacity: 1;
  pointer-events: all;
}

.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-row { display: flex; gap: 10px; animation: msgIn 0.22s ease; }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 500;
  flex-shrink: 0; margin-top: 2px;
  letter-spacing: 0.02em;
}
.msg-row.bot .msg-avatar { background: var(--text); color: #fff; }
.msg-row.user .msg-avatar { background: var(--subtle); color: var(--muted); border: 1px solid var(--border); }

.msg-content { flex: 1; min-width: 0; }

.msg-bubble {
  display: inline-block;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.65;
  max-width: 100%;
}
.msg-row.bot .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg-row.user .msg-bubble {
  background: var(--text);
  color: #fff;
  border-bottom-right-radius: 4px;
  float: right; clear: both;
}

/* ── PANELS ── */
.panel {
  margin-top: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}

.panel-header {
  padding: 11px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}
.panel-header:hover { background: var(--subtle); }
.panel-header.open { border-bottom: 1px solid var(--border); }

.panel-header-left { display: flex; align-items: center; gap: 10px; }

.panel-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--subtle);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}

.panel-label { font-size: 13px; font-weight: 500; }
.panel-sublabel { font-size: 11px; color: var(--muted); margin-top: 1px; }

.panel-chevron {
  color: var(--muted);
  font-size: 11px;
  transition: transform 0.22s;
  line-height: 1;
}
.panel-chevron.open { transform: rotate(180deg); }

.panel-body { max-height: 0; overflow: hidden; transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1); }
.panel-body.open { max-height: 1400px; }
.panel-inner { padding: 14px 16px; }

/* project list */
.project-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
.project-item { background: var(--surface); padding: 11px 13px; transition: background 0.12s; }
.project-item:hover { background: var(--subtle); }
.project-item-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; gap: 8px; }
.project-name { font-family: var(--font-serif); font-size: 15px; letter-spacing: -0.02em; font-weight: 500; }
.project-tag { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); background: var(--subtle); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
.project-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* timeline */
.timeline { display: flex; flex-direction: column; }
.tl-item { display: grid; grid-template-columns: 88px 1fr; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
.tl-item:last-child { border-bottom: none; padding-bottom: 0; }
.tl-period { font-size: 11px; color: var(--muted); font-weight: 300; padding-top: 2px; }
.tl-role { font-size: 13px; font-weight: 500; margin-bottom: 1px; }
.tl-company { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.tl-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* cv */
.cv-name { font-family: var(--font-serif); font-size: 22px; letter-spacing: -0.03em; font-weight: 600; margin-bottom: 2px; }
.cv-role-line { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.cv-section-title { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 12px 0 7px; }
.skill-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.skill-pill { font-size: 11px; padding: 3px 9px; border: 1px solid var(--border); border-radius: 20px; color: var(--muted); }
.cv-target { font-size: 12px; color: var(--muted); line-height: 1.7; padding: 10px 12px; background: var(--subtle); border-radius: 8px; }

/* easter */
.easter-card { background: var(--subtle); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-top: 10px; }
.easter-title { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
.easter-body { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* typing */
.typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.35; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* ── INPUT ZONE ── */
.input-zone {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 720px;
  padding: 0 1.5rem 1.5rem;
  background: linear-gradient(to bottom, transparent, var(--bg) 40%);
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
}

/* landing: vertically centered */
.input-zone.centered {
  bottom: auto;
  top: 50%;
  transform: translate(-50%, 20%);
}

.input-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  transition: box-shadow 0.15s;
}
.input-box:focus-within {
  box-shadow: 0 2px 24px rgba(0,0,0,0.1);
  border-color: #C8C5BE;
}

.chat-input {
  width: 100%;
  background: none;
  border: none;
  padding: 13px 48px 13px 16px;
  font-size: 15px;
  font-family: var(--font-sans);
  color: var(--text);
  resize: none;
  min-height: 48px;
  max-height: 130px;
  outline: none;
  line-height: 1.5;
  display: block;
}
.chat-input::placeholder { color: var(--muted); }

.input-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px 10px;
}

.send-btn {
  width: 32px; height: 32px;
  background: var(--text);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.12s;
  margin-left: auto;
}
.send-btn:hover { opacity: 0.75; }
.send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.send-btn svg { width: 13px; height: 13px; fill: #fff; }

/* suggestions */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
  justify-content: center;
}

.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 13px;
  font-size: 12px;
  font-family: var(--font-sans);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
}
.chip:hover { border-color: var(--text); color: var(--text); background: var(--subtle); }

/* ── PERSISTENT NAV ── */
.visited-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 720px;
  padding: 0 1.5rem 0.5rem;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  pointer-events: none;
  z-index: 40;
  transition: opacity 0.3s;
}

.visited-nav.has-items {
  pointer-events: all;
}

.nav-pill {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 11px;
  font-family: var(--font-sans);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  animation: pillIn 0.2s ease;
  font-weight: 500;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.nav-pill:hover {
  border-color: var(--text);
  color: var(--text);
  background: var(--subtle);
}

@keyframes pillIn {
  from { opacity: 0; transform: translateY(8px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body>

<div class="visited-nav" id="visitedNav"></div>

<header id="hdr">
  <span class="header-name">Evan Maillard</span>
  <button class="back-btn" id="backBtn" onclick="goBack()" title="Retour à l'accueil">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>

<div class="app">

  <!-- LANDING -->
  <div class="landing" id="landing">

<!-- INPUT ZONE (fixed, transitions from center to bottom) -->

<script>
/* DATA */
const DATA = {
  projects: [
    { name: 'Carnetto', tag: 'SaaS · Produit',
      fr: 'SaaS gamifié de suivi d\'entretien véhicule. ~100 licences vendues. Conception, lancement et distribution sans équipe technique.',

    { name: 'Feedcasse', tag: 'Python · Automation',
      fr: 'Pipeline automatisé de publication de contenu court (Python + IA + Instagram/TikTok). Stack technique solide, mauvaise lecture des codes culturels plateforme.',
      en: 'Automated short content pipeline (Python + AI + Instagram/TikTok). Solid tech stack, wrong read of platform cultural codes.' },
    { name: 'Handspinner', tag: 'E-commerce · Timing',
      fr: 'Détection de la tendance aux US avant qu\'elle touche la France. Commercialisation rapide. Premier sur le marché FR.',

      fr: 'Pipeline de traitement de devis automatisé (Make + GPT, ~20 devis/jour). Pipeline SEO actif Make + Claude + WordPress. CRM Pipedrive, prospection B2B multi-secteur, scripts Python pour équipes internes.',
      en: 'Automated quote pipeline (Make + GPT, ~20/day). Live SEO pipeline Make + Claude + WordPress. Pipedrive CRM, multi-sector B2B prospecting, Python scripts for internal teams.' },
    { period: '2020 – 2022',
      role: { fr: '1er employé — Marketing & Growth', en: 'First Employee — Marketing & Growth' },
      company: 'BonjourCyber',
      fr: 'Stack construite from scratch : CRM, site Webflow, cold email, Meta / LinkedIn / Google Ads. Cybersécurité B2B, formation anti-phishing.',
      en: 'Full stack built from scratch: CRM, Webflow site, cold email, Meta / LinkedIn / Google Ads. B2B cybersecurity, anti-phishing training.' },

      role: { fr: 'Responsable Marketing', en: 'Marketing Manager' },

const SYSTEM = `Tu es l'assistant portfolio d'Evan Maillard. Ton rôle : présenter son profil de façon engageante, aérée, et donner envie d'en savoir plus.

RÈGLES ABSOLUES :
- Réponds UNIQUEMENT aux questions liées au profil d'Evan Maillard.
- Pour toute autre demande : "Je suis uniquement ici pour présenter le profil d'Evan. Une question sur son parcours ?"
- 3ème personne ("Evan a...", "Il a réalisé...").
- Adapte la langue à la question (FR ou EN).

FORMAT OBLIGATOIRE pour toutes les réponses texte :
- 1 phrase d'accroche courte (1 ligne, percutante)
- Ligne vide
- 2 ou 3 points clés, chacun sur sa propre ligne, commençant par →
- Ligne vide
- 1 question de relance courte pour inviter à approfondir

Exemple :
"Evan transforme des contraintes métier en outils qui tournent en production.

→ 20 devis traités automatiquement chaque jour sans intervention humaine
→ Un pipeline SEO actif qui génère et publie du contenu seul

function typewrite(el, text, speed = 38) {
  const cursor = el.querySelector('.tagline-cursor');
  let i = 0;
  el.textContent = '';
  el.appendChild(cursor);
  const interval = setInterval(() => {
    if (i < text.length) {
      cursor.insertAdjacentText('beforebegin', text[i]);
      i++;
    } else {
      clearInterval(interval);
      setTimeout(() => cursor.style.display = 'none', 1800);
    }
  }, speed);
}

window.addEventListener('DOMContentLoaded', () => {
  const tag = TAGLINES[Math.floor(Math.random() * TAGLINES.length)];
  const el = document.getElementById('tagline');
  setTimeout(() => typewrite(el, tag), 600);
});

/* VISITED NAV */
const visitedPanels = new Set();

function registerVisit(panelType) {
  if (visitedPanels.has(panelType)) return;
  visitedPanels.add(panelType);
  const nav = document.getElementById('visitedNav');
  const m = PANELS[panelType];
  if (!m) return;
  const pill = document.createElement('button');
  pill.className = 'nav-pill';
  pill.textContent = lang === 'fr' ? m.label.fr : m.label.en;
  pill.onclick = () => {
    activateChat();
    addBotMsg('', panelType);
  };
  nav.appendChild(pill);
  nav.classList.add('has-items');
}

function makePanel(type) {
  const m = PANELS[type];
  const id = 'p'+Math.random().toString(36).slice(2);
  const d = document.createElement('div');
  d.className = 'panel';
  d.innerHTML = `
    <div class="panel-header open" onclick="togglePanel('${id}')">
      <div class="panel-header-left">
        <div class="panel-icon">${m.icon}</div>
        <div>
          <div class="panel-label">${lang==='fr'?m.label.fr:m.label.en}</div>
          <div class="panel-sublabel">${lang==='fr'?m.sub.fr:m.sub.en}</div>
        </div>
      </div>
      <span class="panel-chevron open" id="cv_${id}">▾</span>
    </div>
    <div class="panel-body open" id="${id}">
      <div class="panel-inner">${m.build()}</div>
    </div>`;
  return d;
}

function togglePanel(id) {
  const b = document.getElementById(id);
  const c = document.getElementById('cv_'+id);
  const h = b.previousElementSibling;
  const open = b.classList.toggle('open');
  c.classList.toggle('open', open);
  h.classList.toggle('open', open);
}

/* MESSAGES */
function addUserMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg-row user';
  el.innerHTML = `<div class="msg-avatar">?</div><div class="msg-content"><div class="msg-bubble">${text}</div></div>`;
  document.getElementById('messages').appendChild(el);
  scroll();
}

function addBotMsg(text, panelType) {
  const el = document.createElement('div');
  el.className = 'msg-row bot';
  const content = document.createElement('div');
  content.className = 'msg-content';
  if (text) {
    const b = document.createElement('div');
    b.className = 'msg-bubble';
    b.innerHTML = text;
    content.appendChild(b);
  }
  if (panelType) {
    content.appendChild(makePanel(panelType));
    registerVisit(panelType);
  }
  el.innerHTML = `<div class="msg-avatar">EM</div>`;
  el.appendChild(content);
  document.getElementById('messages').appendChild(el);
  scroll();
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg-row bot'; el.id = 'typing';
  el.innerHTML = `<div class="msg-avatar">EM</div><div class="msg-content"><div class="msg-bubble"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  document.getElementById('messages').appendChild(el);
  scroll();
}

function removeTyping() { document.getElementById('typing')?.remove(); }
function scroll() { const m = document.getElementById('messages'); setTimeout(()=>m.scrollTop=m.scrollHeight, 50); }

/* INPUT */
function resize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }
function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function chipSend(btn) { document.getElementById('inp').value = lang==='fr'?btn.dataset.fr:btn.dataset.en; send(); }

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text || busy) return;

  if (!rl()) { addBotMsg(lang==='fr'?'Limite atteinte pour cette heure.':'Message limit reached for this hour.'); return; }

  activateChat();
  inp.value=''; inp.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  busy=true;

  addUserMsg(text);
  history.push({role:'user',content:text});
  addTyping();

  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history.slice(-8),system:SYSTEM}),
    });
    removeTyping();
    if (!res.ok) throw new Error();
    const data = await res.json();
    let reply = data.content?.[0]?.text || '';
    let panelType = null, displayText = reply;
    try {
      const m = reply.match(/\{[\s\S]*?\}/);
      if (m) { const p=JSON.parse(m[0]); if(p.panel){panelType=p.panel;displayText=p.intro||'';} }
    } catch(e){}
    history.push({role:'assistant',content:reply});
    addBotMsg(displayText, panelType);
  } catch(e) {
    removeTyping();
    addBotMsg(lang==='fr'?'Une erreur est survenue. Réessayez.':'An error occurred. Please try again.');
  }

  busy=false;
  document.getElementById('sendBtn').disabled=false;
}
</script>
