<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F8F7F4;
  --surface: #FFFFFF;
  --border: #E8E6E0;
  --text: #18171A;
  --muted: #888680;
  --subtle: #F2F0EB;
  --radius: 14px;
  --font-serif: 'ClashDisplay', 'DM Sans', sans-serif;
  --font-sans: 'DM Sans', sans-serif;
}

[data-theme="dark"] {
  --bg: #111110;
  --surface: #1C1C1A;
  --border: #2E2E2B;
  --text: #F0EFE9;
  --muted: #7A7870;
  --subtle: #1A1A18;
}

html, body { height: 100%; font-family: var(--font-sans); background: var(--bg); color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s; }

/* HEADER */
header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; background: transparent; transition: background 0.3s, border-color 0.3s; border-bottom: 1px solid transparent; }
header.scrolled { background: rgba(248,247,244,0.92); backdrop-filter: blur(10px); border-bottom-color: var(--border); }
[data-theme="dark"] header.scrolled { background: rgba(17,17,16,0.92); }

.header-name { font-family: var(--font-serif); font-size: 18px; font-weight: 600; letter-spacing: -0.03em; opacity: 0; transition: opacity 0.3s; }
header.scrolled .header-name { opacity: 1; }

.header-left { display: flex; align-items: center; gap: 12px; }

.back-btn { display: none; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 5px 11px; font-size: 12px; font-family: var(--font-sans); color: var(--muted); cursor: pointer; transition: all 0.12s; }
.back-btn:hover { color: var(--text); border-color: var(--text); }
header.scrolled .back-btn { display: flex; }

.visitor-count { font-size: 11px; color: var(--muted); display: none; align-items: center; gap: 4px; }
.visitor-count .dot { width: 5px; height: 5px; border-radius: 50%; background: #22C55E; animation: pulse 2s infinite; }
header.scrolled .visitor-count { display: flex; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

.header-right { display: flex; align-items: center; gap: 10px; }

.theme-btn { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; transition: all 0.12s; color: var(--muted); }
.theme-btn:hover { border-color: var(--text); color: var(--text); }

.lang-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.lang-btn { background: none; border: none; padding: 3px 9px; font-size: 10px; font-family: var(--font-sans); font-weight: 500; letter-spacing: 0.06em; cursor: pointer; color: var(--muted); transition: all 0.12s; }
.lang-btn.active { background: var(--text); color: #fff; }

.li-btn { display: flex; align-items: center; gap: 5px; text-decoration: none; font-size: 11px; font-weight: 500; color: var(--muted); transition: color 0.12s; }
.li-btn:hover { color: var(--text); }
.li-btn svg { width: 13px; height: 13px; fill: currentColor; }

/* APP */
.app { height: 100vh; display: flex; flex-direction: column; max-width: 720px; margin: 0 auto; position: relative; }

/* LANDING */
.landing { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 1.5rem 140px; text-align: center; transition: opacity 0.35s, transform 0.35s; }
.landing.hidden { opacity: 0; pointer-events: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; transform: translateY(-16px); }

.landing-photo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 1.25rem; opacity: 0; transform: scale(0.85); animation: photoIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards; border: 2px solid var(--border); }
.landing-eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; font-weight: 400; opacity: 0; animation: fadeUp 0.5s ease 0.3s forwards; }
.landing-name .word-evan { display: inline-block; opacity: 0; transform: translateY(20px); animation: wordIn 0.5s cubic-bezier(0.22,1,0.36,1) 0.45s forwards; }
.landing-name .word-maillard { display: inline-block; opacity: 0; transform: translateY(20px); animation: wordIn 0.5s cubic-bezier(0.22,1,0.36,1) 0.6s forwards; }
@keyframes photoIn { to { opacity: 1; transform: scale(1); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes wordIn { to { opacity: 1; transform: translateY(0); } }
.landing-name { font-family: var(--font-serif); font-size: clamp(3.8rem, 11vw, 6.5rem); line-height: 0.95; letter-spacing: -0.04em; font-weight: 600; margin-bottom: 0.75rem; }
.landing-name em { font-style: normal; color: var(--muted); font-weight: 300; }
.landing-title { font-size: clamp(0.85rem, 2vw, 1rem); color: var(--muted); font-weight: 300; letter-spacing: 0.04em; margin-bottom: 1.25rem; }
.landing-tagline { font-size: clamp(0.9rem, 2vw, 1.05rem); color: var(--text); font-weight: 300; line-height: 1.6; min-height: 1.7em; margin-bottom: 3rem; max-width: 480px; }
.tagline-cursor { display: inline-block; width: 2px; height: 1em; background: var(--muted); margin-left: 2px; vertical-align: text-bottom; animation: blink 0.9s step-end infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

/* RECRUITER MODE BANNER */
.recruiter-banner { display: none; align-items: center; gap: 8px; background: var(--text); color: #fff; padding: 7px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 1rem; animation: msgIn 0.3s ease; }
.recruiter-banner.visible { display: flex; }
.recruiter-banner span { opacity: 0.75; }

/* MESSAGES */
.messages { flex: 1; overflow-y: auto; padding: 70px 1.5rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.35s; }
.messages.visible { opacity: 1; pointer-events: all; }
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-row { display: flex; gap: 10px; animation: msgIn 0.22s ease; }
@keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; flex-shrink: 0; margin-top: 2px; letter-spacing: 0.02em; }
.msg-row.bot .msg-avatar { background: var(--text); color: var(--bg); }
.msg-row.user .msg-avatar { background: var(--subtle); color: var(--muted); border: 1px solid var(--border); }

.msg-content { flex: 1; min-width: 0; }
.msg-bubble { display: inline-block; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.65; max-width: 100%; word-wrap: break-word; overflow-wrap: break-word; }
.msg-row.bot .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg-row.user .msg-bubble { background: var(--text); color: var(--bg); border-bottom-right-radius: 4px; float: right; clear: both; }
.msg-bubble p { margin: 0; }
.msg-bubble p + p { margin-top: 8px; }
.msg-bubble strong { font-weight: 500; color: var(--text); }
.msg-bubble .msg-bullet { font-weight: 500; color: var(--text); }
.msg-bubble .msg-bullet-text { color: var(--muted); }
.msg-row.bot .msg-bubble .msg-bullet { color: var(--text); }
.msg-row.user .msg-bubble strong,
.msg-row.user .msg-bubble .msg-bullet,
.msg-row.user .msg-bubble .msg-bullet-text { color: inherit; }

/* PANELS */
.panel { margin-top: 10px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--surface); }
.panel-header { padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; transition: background 0.12s; }
.panel-header:hover { background: var(--subtle); }
.panel-header.open { border-bottom: 1px solid var(--border); }
.panel-header-left { display: flex; align-items: center; gap: 10px; }
.panel-icon { width: 28px; height: 28px; border-radius: 7px; background: var(--subtle); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; }
.panel-label { font-size: 13px; font-weight: 500; }
.panel-sublabel { font-size: 11px; color: var(--muted); margin-top: 1px; }
.panel-chevron { color: var(--muted); font-size: 11px; transition: transform 0.22s; line-height: 1; }
.panel-chevron.open { transform: rotate(180deg); }
.panel-body { max-height: 0; overflow: hidden; transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1); }
.panel-body.open { max-height: 2000px; }
.panel-inner { padding: 14px 16px; }

/* project list */
.project-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
.project-item { background: var(--surface); padding: 11px 13px; transition: background 0.12s; }
.project-item:hover { background: var(--subtle); }
.project-item-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; gap: 8px; }
.project-name { font-family: var(--font-serif); font-size: 15px; letter-spacing: -0.02em; font-weight: 500; }
.project-tag { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); background: var(--subtle); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
.project-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* ANIMATED TIMELINE */
.timeline-visual { display: flex; flex-direction: column; position: relative; padding-left: 20px; }
.timeline-visual::before { content: ''; position: absolute; left: 5px; top: 8px; bottom: 8px; width: 1px; background: var(--border); }
.tl-item { position: relative; padding: 0 0 20px 16px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-dot { position: absolute; left: -15px; top: 3px; width: 9px; height: 9px; border-radius: 50%; background: var(--border); border: 2px solid var(--surface); transition: background 0.3s; }
.tl-item:first-child .tl-dot { background: var(--text); }
.tl-period { font-size: 10px; color: var(--muted); font-weight: 300; letter-spacing: 0.04em; margin-bottom: 3px; }
.tl-role { font-size: 13px; font-weight: 500; margin-bottom: 1px; }
.tl-company { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.tl-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* cv */
.cv-name { font-family: var(--font-serif); font-size: 22px; letter-spacing: -0.03em; font-weight: 600; margin-bottom: 2px; }
.cv-role-line { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.cv-section-title { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 12px 0 7px; }
.skill-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.skill-pill { font-size: 11px; padding: 3px 9px; border: 1px solid var(--border); border-radius: 20px; color: var(--muted); }
.cv-target { font-size: 12px; color: var(--muted); line-height: 1.7; padding: 10px 12px; background: var(--subtle); border-radius: 8px; }

/* ANIMATED STATS */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.stat-card { background: var(--subtle); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
.stat-value { font-size: 22px; font-weight: 600; color: var(--text); font-family: var(--font-serif); }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

/* BAR CHART */
.bar-wrap { margin: 4px 0 10px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.bar-name { font-size: 11px; color: var(--muted); width: 90px; flex-shrink: 0; }
.bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: var(--text); width: 0%; transition: width 1s cubic-bezier(0.4,0,0.2,1); }
.bar-pct { font-size: 11px; font-weight: 500; color: var(--text); width: 36px; text-align: right; }

/* easter */
.easter-card { background: var(--subtle); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-top: 10px; }
.easter-title { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
.easter-body { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* CONTACT CTA */
.contact-cta { margin-top: 10px; background: var(--text); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.contact-cta-text { font-size: 13px; color: rgba(255,255,255,0.9); line-height: 1.5; }
.contact-cta-btn { background: #fff; color: var(--text); border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 500; font-family: var(--font-sans); cursor: pointer; white-space: nowrap; text-decoration: none; display: inline-block; transition: opacity 0.12s; }
.contact-cta-btn:hover { opacity: 0.85; }

/* typing */
.typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%,60%,100% { transform:translateY(0); opacity:0.35; } 30% { transform:translateY(-4px); opacity:1; } }

/* INPUT ZONE */
.input-zone { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 720px; padding: 0 1.5rem 1.5rem; background: linear-gradient(to bottom, transparent, var(--bg) 40%); transition: bottom 0.35s cubic-bezier(0.4,0,0.2,1), top 0.35s cubic-bezier(0.4,0,0.2,1); z-index: 30; }
.input-zone.centered { bottom: auto; top: 55%; transform: translate(-50%, -50%); }
.input-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.06); transition: box-shadow 0.15s; }
.input-box:focus-within { box-shadow: 0 2px 24px rgba(0,0,0,0.1); border-color: #C8C5BE; }
.input-row { display: flex; align-items: flex-end; }
.chat-input { flex: 1; background: none; border: none; padding: 13px 8px 13px 16px; font-size: 15px; font-family: var(--font-sans); color: var(--text); resize: none; min-height: 48px; max-height: 130px; outline: none; line-height: 1.5; }
.chat-input::placeholder { color: var(--muted); }
.input-actions { display: flex; align-items: center; gap: 4px; padding: 8px 10px; }

.mic-btn { width: 32px; height: 32px; background: none; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; color: var(--muted); }
.mic-btn:hover { border-color: var(--text); color: var(--text); }
.mic-btn.listening { background: #EF4444; border-color: #EF4444; color: #fff; animation: micPulse 1s infinite; }
@keyframes micPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); } }
.mic-btn svg { width: 13px; height: 13px; fill: currentColor; }

.send-btn { width: 32px; height: 32px; background: var(--text); border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.12s; }
.send-btn:hover { opacity: 0.75; }
.send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.send-btn svg { width: 13px; height: 13px; fill: var(--bg); }

/* CHIPS */
.chips { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; align-items: center; }
.chips-main { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-family: var(--font-sans); color: var(--muted); cursor: pointer; transition: all 0.12s; white-space: nowrap; }
.chip:hover { border-color: var(--text); color: var(--text); background: var(--subtle); }
.chip-more { border-style: dashed; font-size: 11px; letter-spacing: 0.02em; }
.chip-more:hover { border-style: solid; }

.chips-more { width: 100%; max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s; opacity: 0; }
.chips-more.open { max-height: 300px; opacity: 1; }
.chips-more-section { margin-top: 10px; }
.chips-more-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; text-align: center; }
.chips-more-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }

/* FOOTER */
.site-footer { text-align: center; padding: 1.5rem 1.5rem 7rem; flex-shrink: 0; }
.footer-github { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); text-decoration: none; transition: color 0.12s; letter-spacing: 0.01em; }
.footer-github:hover { color: var(--text); }
.footer-github svg { flex-shrink: 0; opacity: 0.6; }
.footer-github:hover svg { opacity: 1; }

/* FOLLOWUP CHIPS */
.followup-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.followup-chip { background: none; border: 1px solid var(--border); border-radius: 16px; padding: 4px 11px; font-size: 11px; font-family: var(--font-sans); color: var(--muted); cursor: pointer; transition: all 0.12s; text-align: left; }
.followup-chip:hover { border-color: var(--text); color: var(--text); background: var(--subtle); }

/* PERSISTENT NAV */
.visited-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 720px; padding: 0 1.5rem 0.5rem; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; pointer-events: none; z-index: 20; }
.visited-nav.has-items { pointer-events: all; }
.nav-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-family: var(--font-sans); color: var(--muted); cursor: pointer; transition: all 0.15s; animation: pillIn 0.2s ease; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.nav-pill:hover { border-color: var(--text); color: var(--text); background: var(--subtle); }
@keyframes pillIn { from { opacity:0; transform:translateY(8px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }

@media (max-width: 600px) {
  /* Header */
  header { padding: 0 1rem; }
  .header-name { font-size: 15px; }
  .li-btn span { display: none; }

  /* Landing */
  .landing { padding: 0 1rem 160px; }
  .landing-name { font-size: clamp(2.4rem, 14vw, 3.2rem); }
  .landing-tagline { font-size: 0.9rem; }

  /* Messages */
  .messages { padding: 60px 1rem 1rem; }
  .msg-bubble { font-size: 13px; max-width: 90%; }

  /* Input zone */
  .input-zone { padding: 0 1rem 1rem; }
  .input-zone.centered { top: 52%; transform: translate(-50%, -50%); }
  .chat-input { font-size: 14px; padding: 11px 8px 11px 13px; }

  /* Chips - allow wrapping on mobile */
  .chip { white-space: normal; text-align: center; font-size: 11px; padding: 5px 11px; }
  .chips-main { justify-content: center; }

  /* Panels */
  .stat-grid { grid-template-columns: 1fr 1fr; gap: 5px; }

function typewrite(el, text, speed=38) {
  const cursor = el.querySelector('.tagline-cursor');
  let i = 0;
  el.textContent = '';
  el.appendChild(cursor);
  const iv = setInterval(() => {
    if (i < text.length) { cursor.insertAdjacentText('beforebegin', text[i++]); }
    else { clearInterval(iv); setTimeout(() => cursor.style.display='none', 1800); }
  }, speed);
}

/* ── MIC ── */
let recognition = null;
function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert(lang==='fr' ? 'Votre navigateur ne supporte pas la reconnaissance vocale.' : 'Your browser does not support speech recognition.');
    return;
  }
  const btn = document.getElementById('micBtn');
  if (recognition) { recognition.stop(); recognition = null; btn.classList.remove('listening'); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = lang === 'fr' ? 'fr-FR' : 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  btn.classList.add('listening');
  recognition.onresult = (e) => {
    document.getElementById('inp').value = e.results[0][0].transcript;
    btn.classList.remove('listening');
    recognition = null;
    send();
  };
  recognition.onerror = recognition.onend = () => { btn.classList.remove('listening'); recognition = null; };
  recognition.start();
}

function chipSend(btn) { document.getElementById('inp').value = lang==='fr'?btn.dataset.fr:btn.dataset.en; send(); }

/* ── SEND ── */
async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text || busy) return;
  if (!rl()) { addBotMsg(lang==='fr'?'Limite de messages atteinte pour cette heure.':'Message limit reached for this hour.'); return; }

  activateChat();
  inp.value=''; inp.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  busy=true;

  addUserMsg(text);
  history.push({role:'user',content:text});
  addTyping();

  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history.slice(-10),system:SYSTEM}),
    });
    removeTyping();
    if (!res.ok) throw new Error();
    const data = await res.json();
    let reply = data.content?.[0]?.text || '';
    let panelType=null, displayText=reply;

    try {
      const m = reply.match(/\{[\s\S]*?\}/);
      if (m) {
        const p = JSON.parse(m[0]);
        if (p.panel) { panelType=p.panel; displayText=p.intro||''; }
        if (p.recruiter) {
          recruiterMode=true; recruiterRole=p.role||'';
          displayText=p.response||reply;
          const banner = document.getElementById('recruiterBanner');
          banner.classList.add('visible');
          document.getElementById('recruiterText').textContent = (lang==='fr'?'Mode recruteur — ':'Recruiter mode — ') + recruiterRole;
        }
      }
    } catch(e) {}

    history.push({role:'assistant',content:reply});
    addBotMsg(displayText, panelType);
  } catch(e) {
    removeTyping();
    addBotMsg(lang==='fr'?'Une erreur est survenue. Réessayez.':'An error occurred. Please try again.');
  }

  busy=false;
  document.getElementById('sendBtn').disabled=false;
}
